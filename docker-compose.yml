services:
  app:
    build:
      context: .
    image: hls-video-player:latest
    container_name: hls-video-app
    ports:
      - "7860:7860"
    environment:
      - PORT=7860
      - MEDIA_ROOT=/media
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-2}
      - FFMPEG_THREADS=${FFMPEG_THREADS:-2}
      - FFMPEG_PRESET=${FFMPEG_PRESET:-veryfast}
      - FFMPEG_NICE=${FFMPEG_NICE:-10}
    volumes:
      - ./media:/media
    restart: unless-stopped
    # CPU / メモリ上限（変換時の暴走防止）。README の「リソース制限」を参照。
    deploy:
      resources:
        limits:
          cpus: "${APP_CPUS:-2.0}"
          memory: "${APP_MEMORY:-2g}"
