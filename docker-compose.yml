services:
  backend:
    build:
      context: ./backend
    image: hls-video-player-backend:latest
    container_name: hls-video-backend
    environment:
      - PORT=3000
      - MEDIA_ROOT=/media
      # nginx が静的フロントを配信するので backend 側では無効化
      - FRONTEND_ROOT=
    volumes:
      - ./media:/media
    # ホスト露出せず、nginx 経由でのみアクセス
    expose:
      - "3000"
    restart: unless-stopped
    networks: [app]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: hls-video-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./media:/media:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks: [app]

  # One-shot: docker compose run --rm converter /media/source/xxx.mp4 [id]
  converter:
    build:
      context: ./backend
    image: hls-video-player-backend:latest
    profiles: ["tools"]
    volumes:
      - ./media:/media
    environment:
      - MEDIA_ROOT=/media
    entrypoint: ["node", "scripts/convert.js"]

networks:
  app:
    driver: bridge
