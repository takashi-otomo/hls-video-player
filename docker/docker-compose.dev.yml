# 開発モード (Vite HMR)
# docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up

services:
  gui:
    build:
      target: builder
    command: ["bun", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
      - "${PORT:-7860}:7860"
    volumes:
      - ../gui-web:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
