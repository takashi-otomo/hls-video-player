# dev override: ソースをバインドマウントして、コンテナを再起動せずに編集を反映する。
# Gradio の reload 機能は使わず、uvicorn の --reload を使うため command を差し替える。
services:
  app:
    command: ["python", "-m", "uvicorn", "app.main:build_app", "--factory", "--host", "0.0.0.0", "--port", "7860", "--reload", "--reload-dir", "/app/app", "--reload-dir", "/app/hls_video"]
    volumes:
      - ./media:/media
      - ./app:/app/app
      - ./hls_video:/app/hls_video
      - ./static:/app/static
    environment:
      - NODE_ENV=development
