<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLS Player</title>
  <link href="https://vjs.zencdn.net/8.21.1/video-js.css" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="player-body">
  <header class="site-header">
    <a href="/" class="back-link">← ライブラリに戻る</a>
    <h1 id="video-title">再生中…</h1>
  </header>

  <main class="player-container">
    <video-js
      id="streaming-player"
      class="video-js vjs-default-skin vjs-big-play-centered"
      controls
      preload="auto"
      width="960"
      height="540"
    ></video-js>

    <aside class="player-meta">
      <h2>ストリーム情報</h2>
      <dl id="stream-info">
        <dt>ソース</dt><dd id="meta-source">—</dd>
        <dt>選択画質</dt><dd id="meta-resolution">—</dd>
        <dt>帯域幅</dt><dd id="meta-bandwidth">—</dd>
        <dt>サムネイル</dt><dd id="meta-sprite">—</dd>
      </dl>
    </aside>
  </main>

  <script src="https://vjs.zencdn.net/8.21.1/video.min.js"></script>
  <script src="/player.js"></script>
</body>
</html>
