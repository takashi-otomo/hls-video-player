<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLS Video Library</title>
  <link href="https://vjs.zencdn.net/8.21.1/video-js.css" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <h1>HLS Video Library</h1>
    <p class="tagline">MP4 → HLS アダプティブストリーミング / シークバーサムネイル対応</p>
  </header>

  <main class="container">
    <section>
      <div class="section-head">
        <h2>動画一覧</h2>
        <button id="refresh-sources" class="btn btn-ghost" title="一覧を更新">↻ 更新</button>
      </div>
      <p id="sources-status" class="status">読み込み中…</p>
      <table id="sources-table" class="sources-table" hidden>
        <thead>
          <tr>
            <th>ファイル名</th>
            <th class="num">サイズ</th>
            <th>更新日時</th>
            <th>状態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <details class="help-panel">
      <summary>動画を追加する</summary>
      <p>
        <code>media/source/</code> に <code>.mp4 / .mov / .mkv / .webm</code> を配置し、
        上のテーブルの <strong>変換</strong> ボタンを押してください。
      </p>
      <p>CLI から変換する場合:</p>
      <pre><code>docker compose run --rm converter /media/source/your-video.mp4</code></pre>
    </details>
  </main>

  <script src="https://vjs.zencdn.net/8.21.1/video.min.js"></script>
  <script src="/playerFactory.js"></script>
  <script src="/library.js"></script>
</body>
</html>
