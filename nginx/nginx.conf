worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    # HLS / WebVTT の MIME を追加（同じ http ブロック内で types は追記扱い）
    types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t                    ts;
        text/vtt                      vtt;
    }
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;

    # Range リクエストを正しく扱うため、圧縮は HTML/JSON 限定
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/vtt;
    gzip_min_length 1024;

    upstream backend {
        server backend:3000;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # 共通 CORS（MSE / hls.js 等からの cross-origin アクセスに備える）
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Origin, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # HLS プレイリスト + セグメント
        location /hls/ {
            alias /media/hls/;
            autoindex off;

            location ~* \.m3u8$ {
                add_header Cache-Control "no-cache" always;
                add_header Access-Control-Allow-Origin * always;
            }
            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                add_header Access-Control-Allow-Origin * always;
            }
        }

        # スプライト画像 + WebVTT
        location /sprites/ {
            alias /media/sprites/;
            autoindex off;
            add_header Cache-Control "public, max-age=3600" always;
        }

        # API は backend にリバースプロキシ
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # フロントエンド（静的ファイル）
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
